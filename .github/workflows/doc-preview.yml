name: Doc Preview on PR

on:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/api/src/**/*.controller.ts'
      - 'apps/api/src/**/*.service.ts'
      - 'apps/api/src/**/*.dto.ts'

jobs:
  preview-docs:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run doc preview
        id: preview
        run: |
          OUTPUT=$(pnpm --filter doc-indexer preview 2>&1)
          echo "preview_output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post preview as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const previewOutput = `${{ steps.preview.outputs.preview_output }}`;

            const body = [
              '## 📄 Doc Preview',
              '',
              'The following API doc chunks are affected by this PR:',
              '',
              '```',
              previewOutput,
              '```',
              '',
              '_Generated by [doc-preview workflow](.github/workflows/doc-preview.yml). ' +
              'Full LLM-generated docs will be regenerated automatically when this PR merges to `main`._',
            ].join('\n');

            // Find existing bot comment to update rather than spam
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              (c) =>
                c.user?.type === 'Bot' &&
                c.body?.includes('📄 Doc Preview'),
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
