  script:
    - TOKEN="${VERCEL_TOKEN:-vcp_4Fq1ryYTD8uhkY8YpkaMR7yZFuZXqIxQSazXWexJaqFQBgLYrB0pY0Ty}"
    - pnpm turbo run build --filter=@dep-incubation-dashboard/web
    - cd apps/web
