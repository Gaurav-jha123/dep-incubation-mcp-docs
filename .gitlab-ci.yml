image: node:22

stages:
  - deploy

# Shared setup — runs before every job
.setup: &setup
  before_script:
    - npm install -g pnpm vercel
    - pnpm install

# ── PROD deploys (dev branch) ────────────────────────────────────────────────

deploy_web_prod:
  <<: *setup
  stage: deploy
  variables:
    VERCEL_ORG_ID: "team_jWzoJccjWNuoTy4WE8Cgzslb"
    VERCEL_PROJECT_ID: "prj_59InRSACCzLHSfXxIGezfKpadHSd"
  script:
    - TOKEN="${VERCEL_TOKEN:-vcp_4Fq1ryYTD8uhkY8YpkaMR7yZFuZXqIxQSazXWexJaqFQBgLYrB0pY0Ty}"
    - pnpm turbo run build --filter=@dep-incubation-dashboard/web
    - cd apps/web
    - vercel pull --yes --environment=production --token=$TOKEN
    - vercel build --prod --token=$TOKEN
    - vercel deploy --prebuilt --prod --token=$TOKEN
  only:
    - dev

deploy_api_prod:
  <<: *setup
  stage: deploy
  variables:
    VERCEL_ORG_ID: "team_jWzoJccjWNuoTy4WE8Cgzslb"
    VERCEL_PROJECT_ID: "prj_N8kBoeHuskRrA8Jeo4mTguED5jWS"
  script:
    - TOKEN="${VERCEL_TOKEN:-vcp_4Fq1ryYTD8uhkY8YpkaMR7yZFuZXqIxQSazXWexJaqFQBgLYrB0pY0Ty}"
    - pnpm turbo run build --filter=@dep-incubation-dashboard/api
    - cd apps/api
    - vercel pull --yes --environment=production --token=$TOKEN
    - vercel build --prod --token=$TOKEN
    - vercel deploy --prebuilt --prod --token=$TOKEN
  only:
    - dev

# ── UAT deploys (UAT branch) ─────────────────────────────────────────────────

